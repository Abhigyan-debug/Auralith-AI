<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="ringGrad" x1="20" y1="18" x2="222" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="leftLegGrad" x1="72" y1="198" x2="120" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="rightLegGrad" x1="120" y1="44" x2="168" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="94" y1="150" x2="146" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="sparkGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="120" cy="120" r="117" fill="#070504"/>
  <circle cx="120" cy="120" r="115.5" fill="none" stroke="url(#ringGrad)" stroke-width="2.4" opacity="0.85"/>

  <!-- motion trail -->
  <circle cx="54" cy="205" r="6" fill="#fbbf24" opacity="0.85"/>
  <circle cx="37" cy="211" r="4.1" fill="#fbbf24" opacity="0.5"/>
  <circle cx="24" cy="215" r="2.6" fill="#fbbf24" opacity="0.28"/>

  <!-- the A, two ribbon strokes meeting at the apex -->
  <line x1="168" y1="198" x2="120" y2="44" stroke="url(#rightLegGrad)" stroke-width="27" stroke-linecap="round"/>
  <line x1="72" y1="198" x2="120" y2="44" stroke="url(#leftLegGrad)" stroke-width="27" stroke-linecap="round"/>
  <line x1="95" y1="150" x2="145" y2="150" stroke="url(#crossGrad)" stroke-width="21" stroke-linecap="round"/>

  <!-- spark in the counter -->
  <circle cx="120" cy="106" r="17" fill="url(#sparkGlow)"/>
  <path d="M120,95 C121.6,102 122,102.4 129,104 C122,105.6 121.6,106 120,113 C118.4,106 118,105.6 111,104 C118,102.4 118.4,102 120,95 Z"
        fill="#fef3c7" filter="url(#softGlow)"/>
</svg>
