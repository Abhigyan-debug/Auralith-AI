<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1917"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="flame" x1="24" y1="8" x2="24" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fcd34d"/>
      <stop offset="0.45" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ea580c" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0" y1="24" x2="48" y2="24" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#shell)"/>
  <rect width="48" height="48" rx="12" fill="url(#flame)" opacity="0.06"/>

  <!-- Flask neck -->
  <rect x="19" y="7" width="10" height="12" rx="3" fill="none" stroke="url(#bracket)" stroke-width="1.8"/>

  <!-- Flask body -->
  <path d="M15 36 C13 32 14 28 19 24 L19 19 L29 19 L29 24 C34 28 35 32 33 36 C31.5 39 17 39 15 36Z"
        fill="url(#flame)" opacity="0.18" stroke="url(#bracket)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Inner flame -->
  <path d="M24 27 C24 27 21.5 30 21.5 32.5 C21.5 34 22.6 35 24 35 C25.4 35 26.5 34 26.5 32.5 C26.5 30 24 27 24 27Z"
        fill="url(#flame)" filter="url(#glow)" opacity="0.9"/>

  <!-- Code brackets inside flask -->
  <text x="18.5" y="33" font-family="JetBrains Mono, monospace" font-size="7" font-weight="700"
        fill="url(#bracket)" opacity="0.6">&lt;/&gt;</text>
</svg>
